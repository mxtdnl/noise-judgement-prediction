<html lang="en">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    :root{

      --ink-3:#6B6457;
      --ink-4:#9A917F;
      --line:#E2D9C2;
      --line-2:#D2C7A8;
      --signal:#1E5F70;
      --signal-2:#2A8295;
      --signal-soft:#D6E6E9;
      --noise:#E66B3D;
      --noise-2:#CA5430;
      --noise-soft:#F7DBCB;

      --gold-soft:#F2E2B5;
      --leaf:#5A7A3D;

      --good:#3F7A4A;
      --r-sm:8px; --r-md:14px; --r-lg:22px; --r-xl:32px;
      --shadow-sm:0 1px 0 rgba(0,0,0,.04), 0 1px 2px rgba(46,38,20,.06);
      --shadow-md:0 1px 0 rgba(255,253,246,.7) inset, 0 1px 0 rgba(0,0,0,.04), 0 6px 18px rgba(46,38,20,.08);
      --shadow-lg:0 1px 0 rgba(255,253,246,.7) inset, 0 8px 32px rgba(46,38,20,.14);
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);
      font-family:"Geist","Geist Fallback",ui-sans-serif,system-ui,sans-serif;
      font-feature-settings:"ss01","ss02","cv11";
      -webkit-font-smoothing:antialiased;
      text-rendering:optimizeLegibility;
    }
    body{min-height:100vh;overflow-x:hidden}
    .serif{font-family:"Newsreader",ui-serif,Georgia,serif; font-weight:500; letter-spacing:-.01em}
    .mono{font-family:"Geist Mono",ui-monospace,monospace; font-variant-numeric:tabular-nums}
    button{font-family:inherit; color:inherit}
    a{color:inherit}

    /* paper texture */
    .paper{
      background:
        radial-gradient(1200px 600px at 90% -10%, rgba(201,148,37,.06), transparent 60%),
        radial-gradient(900px 500px at -10% 110%, rgba(30,95,112,.06), transparent 55%),
        var(--bg);
    }

    /* generic */
    .card{background:var(--bg-card); border:1px solid var(--line); border-radius:var(--r-lg); box-shadow:var(--shadow-md)}
    .pill{display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:999px; font-size:12px; border:1px solid var(--line-2); background:var(--bg-card); color:var(--ink-2)}
    .kbd{font-family:"Geist Mono",monospace; font-size:11px; padding:2px 6px; border-radius:5px; background:var(--bg-soft); border:1px solid var(--line-2); color:var(--ink-2)}

    /* button reset for our React Button */
    .btn{appearance:none; border:0; cursor:pointer; transition:transform .12s ease, box-shadow .2s ease, background .2s ease}
    .btn:active{transform:translateY(1px)}

    /* slider track */
    input[type=range]{-webkit-appearance:none; appearance:none; width:100%; height:36px; background:transparent; cursor:pointer}
    input[type=range]:focus{outline:none}
    input[type=range]::-webkit-slider-runnable-track{height:8px; border-radius:999px; background:var(--bg-soft); border:1px solid var(--line)}
    input[type=range]::-moz-range-track{height:8px; border-radius:999px; background:var(--bg-soft); border:1px solid var(--line)}
    input[type=range]::-webkit-slider-thumb{-webkit-appearance:none; appearance:none; width:26px; height:26px; border-radius:50%; background:var(--ink); border:3px solid #FFFDF6; box-shadow:0 2px 8px rgba(0,0,0,.18); margin-top:-10px}
    input[type=range]::-moz-range-thumb{width:24px; height:24px; border-radius:50%; background:var(--ink); border:3px solid #FFFDF6; box-shadow:0 2px 8px rgba(0,0,0,.18)}

    /* scrollbar */
    ::-webkit-scrollbar{width:10px; height:10px}
    ::-webkit-scrollbar-thumb{background:rgba(60,55,46,.25); border-radius:8px; border:2px solid transparent; background-clip:content-box}
    ::-webkit-scrollbar-thumb:hover{background:rgba(60,55,46,.4); background-clip:content-box; border:2px solid transparent}

    /* layout */
    .shell{min-height:100vh; display:flex; flex-direction:column}
    .topbar{position:sticky; top:0; z-index:50; backdrop-filter:blur(16px) saturate(150%); background:rgba(241,236,222,.78); border-bottom:1px solid var(--line)}

    /* animations */
    @keyframes fadeUp{from{opacity:0; transform:translateY(8px)} to{opacity:1; transform:none}}
    .fadeup{animation:fadeUp .35s ease-out both}
    @keyframes pop{from{transform:scale(.94); opacity:0} to{transform:scale(1); opacity:1}}
    .pop{animation:pop .25s cubic-bezier(.2,.9,.3,1.2) both}
    @keyframes pulse{0%,100%{opacity:.8} 50%{opacity:.35}}
    .pulse{animation:pulse 1.6s ease-in-out infinite}

    /* sr-only */
    .sr{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

    /* dark variant overrides applied through .theme-dark wrapper */
    .theme-dark{
      --bg:#16140F; --bg-card:#201D17; --bg-soft:#2A2620; --ink:#F2EBD8; --ink-2:#D7CFB8;
      --ink-3:#9B9279; --ink-4:#6C6552; --line:#332E25; --line-2:#3F392E;
      --signal-soft:#163942; --noise-soft:#3C2418; --gold-soft:#3B2F11; --leaf-soft:#293321;
    }
    .theme-dark .paper{background:
      radial-gradient(1200px 600px at 90% -10%, rgba(201,148,37,.08), transparent 60%),
      radial-gradient(900px 500px at -10% 110%, rgba(42,130,149,.10), transparent 55%),
      var(--bg);}
    .theme-dark input[type=range]::-webkit-slider-thumb{background:#F2EBD8; border-color:#201D17}
    .theme-dark .topbar{background:rgba(22,20,15,.78)}

    /* cool variant */
    .theme-cool{
      --bg:#ECEEF1; --bg-card:#FFFFFF; --bg-soft:#E1E5EA; --ink:#11161D; --ink-2:#2D343F;
      --ink-3:#5B6471; --ink-4:#8A93A1; --line:#D8DDE3; --line-2:#C5CCD4;

      --gold:#A6822D; --gold-soft:#EFE0BA; --leaf:#3A7A6A; --leaf-soft:#D0E4DC;
    }
